<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte - FIDDLE-App</title>
    
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff7675; 
            --primary-glow: rgba(255, 118, 117, 0.3); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0b0d12; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, #1a1f2e 0%, #0b0d12 60%);
        }

        .card { 
            background: rgba(30, 34, 43, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            width: 100%; 
            max-width: 380px; 
            border-radius: 32px; 
            padding: 40px 25px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .nom-resto { font-size: 11px; text-transform: uppercase; letter-spacing: 4px; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
        .welcome { font-size: 16px; color: #94a3b8; margin-bottom: 5px; }
        .points-number { font-size: 82px; font-weight: 800; color: white; line-height: 1; margin: 10px 0; text-shadow: 0 0 20px var(--primary-glow); }
        .points-label { font-size: 11px; color: #64748b; letter-spacing: 2px; margin-bottom: 25px; font-weight: 700; }
        
        .progress-container { background: rgba(255,255,255,0.05); height: 12px; border-radius: 20px; margin: 20px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { background: linear-gradient(90deg, var(--primary), #fff); height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1); }
        
        #qrcode { background: white; padding: 12px; border-radius: 20px; display: inline-block; margin: 25px 0; border: 4px solid rgba(255,255,255,0.1); }
        .reward-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 18px; font-size: 13px; margin: 15px 0; color: #cbd5e1; line-height: 1.4; }
        
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <main class="card">
        <header class="nom-resto">Chargement...</header>
        <p class="welcome">Bonjour, <span id="user-prenom" class="loading-pulse">...</span></p>
        
        <section class="points-display">
            <div class="points-number loading-pulse" id="user-points">--</div>
            <div class="points-label">POINTS FIDÉLITÉ</div>
        </section>

        <section class="progress-section">
            <div class="progress-container">
                <div class="progress-bar" id="barre-progression"></div>
            </div>
            <p id="phrase-info" style="font-size: 14px; color: #cbd5e1; font-weight: 500;">Calcul de vos points...</p>
            <div class="reward-box texte-recompense">Chargement de l'offre...</div>
        </section>

        <section class="qr-section">
            <div id="qrcode"></div>
            <p style="font-size: 11px; color: #64748b;">Présentez ce QR Code lors de votre passage</p>
        </section>
    </main>

    <script>
        // 1. Initialisation de la config
        const config = appliquerConfig();
        
        // 2. Récupération des paramètres URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const restoID = config.id;

        if (email) {
            // 3. Génération du QR Code
            new QRCode(document.getElementById("qrcode"), {
                text: email,
                width: 130,
                height: 130,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // 4. Appel API de LECTURE avec cache-busting (v=Date.now())
            const urlAPI = `${config.scriptLecture}?email=${encodeURIComponent(email)}&resto=${restoID}&cache=${Date.now()}`;

            fetch(urlAPI)
                .then(response => response.json())
                .then(data => {
                    // Mise à jour du prénom
                    const prenomEl = document.getElementById('user-prenom');
                    prenomEl.innerText = data.prenom || "Client";
                    prenomEl.classList.remove('loading-pulse');

                    // Mise à jour des points
                    const points = parseInt(data.points) || 0;
                    const pointsEl = document.getElementById('user-points');
                    pointsEl.innerText = points;
                    pointsEl.classList.remove('loading-pulse');

                    // Mise à jour de la progression
                    const seuil = config.seuilPoints;
                    const pourcentage = Math.min((points / seuil) * 100, 100);
                    document.getElementById('barre-progression').style.width = `${pourcentage}%`;

                    // Texte d'info dynamique
                    const phraseInfo = document.getElementById('phrase-info');
                    if (points < seuil) {
                        const reste = seuil - points;
                        phraseInfo.innerHTML = `Plus que <strong>${reste} point${reste > 1 ? 's' : ''}</strong> avant votre cadeau !`;
                    } else {
                        phraseInfo.innerHTML = "🎉 <strong>Cadeau débloqué !</strong>";
                        phraseInfo.style.color = "var(--primary)";
                    }
                })
                .catch(error => {
                    console.error("Erreur API :", error);
                    document.getElementById('phrase-info').innerText = "Erreur de chargement des points.";
                });

        } else {
            document.querySelector('.card').innerHTML = "<h1>Oups !</h1><p>Lien invalide. Veuillez utiliser le lien reçu par email.</p>";
        }
    </script>
</body>
</html>
