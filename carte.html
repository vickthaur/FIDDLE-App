<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte de Fidélité</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff7675; /* Sera remplacé par config.js */
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-glow: rgba(255, 118, 117, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
            background-image: radial-gradient(circle at top center, var(--primary-glow) 0%, transparent 60%);
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; max-width: 380px; 
            border-radius: 32px; padding: 40px 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            position: relative;
            overflow: hidden;
        }

        .logo-resto { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 3px; 
            color: #94a3b8; margin-bottom: 25px; font-weight: 800;
        }

        .welcome { font-size: 18px; margin-bottom: 5px; color: #cbd5e1; }
        .welcome strong { color: white; font-weight: 800; }

        .points-display { margin: 30px 0; }
        .points-number { 
            font-size: 85px; font-weight: 800; color: var(--primary); 
            line-height: 1; margin-bottom: 5px;
            text-shadow: 0 0 30px var(--primary-glow);
            transition: all 0.5s ease;
        }
        
        .points-label { font-size: 12px; color: #64748b; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .progress-container { 
            background: rgba(255,255,255,0.05); height: 14px; 
            border-radius: 20px; margin: 25px 0 15px 0; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .progress-bar { 
            background: var(--primary); height: 100%; width: 0%; 
            border-radius: 20px; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        #phrase-info { font-size: 14.5px; color: #94a3b8; font-weight: 500; margin-bottom: 30px; line-height: 1.4; }
        #phrase-info strong { color: white; font-weight: 700; }

        .qr-section {
            background: rgba(0,0,0,0.2); padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.03); margin-top: 10px;
        }

        #qrcode { 
            background: white; padding: 15px; border-radius: 16px; 
            display: inline-block; margin-bottom: 15px;
        }
        
        .instructions { font-size: 12px; color: #64748b; line-height: 1.5; font-weight: 500; }

        /* Bouton Avis Google (Caché par défaut) */
        .btn-avis {
            display: none; width: 100%; background: rgba(255,255,255,0.1); color: white; 
            text-decoration: none; padding: 15px; border-radius: 14px; 
            font-size: 14px; font-weight: 700; margin-top: 15px; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn-avis:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .loading-pulse { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-resto nom-resto">Chargement...</div>
        <p class="welcome">Bonjour <strong id="user-prenom">...</strong></p>
        
        <div class="points-display">
            <div class="points-number loading-pulse" id="user-points">-</div>
            <div class="points-label">Points Fidélité</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="barre-progression"></div>
        </div>

        <p id="phrase-info">Synchronisation en cours...</p>

        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="instructions">Présentez ce QR Code lors de votre passage<br>pour cumuler vos points.</p>
            
            <a href="#" id="btn-google" class="btn-avis" target="_blank">⭐ Laissez-nous un avis</a>
        </div>
    </div>

    <script>
        // 1. Initialisation
        const config = appliquerConfig();
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        // 2. Moteur d'affichage
        function actualiserAffichage(points, prenom) {
            document.getElementById('user-prenom').innerText = prenom;
            
            const ptsElement = document.getElementById('user-points');
            ptsElement.innerText = points;
            ptsElement.classList.remove('loading-pulse');
            
            // Animation de la barre
            const pourcentage = (points / config.seuilPoints) * 100;
            document.getElementById('barre-progression').style.width = Math.min(pourcentage, 100) + "%";

            // Gestion de l'état (En cours VS Cadeau)
            const phraseInfo = document.getElementById('phrase-info');
            const btnGoogle = document.getElementById('btn-google');

            if (points < config.seuilPoints) {
                phraseInfo.innerHTML = `Plus que <strong>${config.seuilPoints - points} points</strong> avant votre cadeau !<br><span style="font-size:12px; color:var(--primary);">${config.recompense}</span>`;
            } else {
                phraseInfo.innerHTML = `🎉 <strong>CADEAU DÉBLOQUÉ !</strong><br><span style="font-size:13px;">Montrez cet écran au serveur.</span>`;
                phraseInfo.style.color = "var(--primary)";
                
                // Hack Marketing : On affiche le bouton Google si le client a gagné !
                if (config.lienAvisGoogle) {
                    btnGoogle.style.display = "block";
                    btnGoogle.href = config.lienAvisGoogle;
                }
            }
        }

        // 3. Récupération des données depuis les DEUX tables Supabase
        async function chargerDonnees() {
            if (!email) {
                document.getElementById('phrase-info').innerHTML = "<span style='color:#ef4444;'>Erreur : Lien invalide (Email manquant)</span>";
                document.getElementById('user-points').classList.remove('loading-pulse');
                return;
            }

            // Génération immédiate du QR code 
            new QRCode(document.getElementById("qrcode"), {
                text: email,
                width: 140, height: 140,
                colorDark : "#0f172a", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            try {
                let prenomFinal = "Client";
                let pointsFinaux = 0;

                // REQUÊTE A : On cherche son prénom dans le CRM global (table 'clients')
                const { data: clientData } = await _supabase.from('clients').select('prenom').eq('email', email).maybeSingle();
                if (clientData && clientData.prenom) {
                    prenomFinal = clientData.prenom;
                }

                // REQUÊTE B : On cherche ses points pour CE restaurant précis (table 'points')
                const { data: pointsData } = await _supabase.from('points')
                    .select('total_points')
                    .eq('client_email', email)
                    .eq('restaurant_id', config.id)
                    .maybeSingle();

                if (pointsData) {
                    pointsFinaux = pointsData.total_points;
                }

                // Affichage final
                actualiserAffichage(pointsFinaux, prenomFinal);

            } catch (err) {
                console.error("Erreur de synchronisation:", err);
                actualiserAffichage(0, "Client");
                document.getElementById('phrase-info').innerText = "Connexion faible. Données non garanties.";
            }
        }

        chargerDonnees();
    </script>
</body>
</html>
