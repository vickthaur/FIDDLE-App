<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte Fidélité</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff7675; /* Remplacé dynamiquement par config.js */
            --bg-color: #0f172a;
            --card-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 50%);
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 380px; 
            border-radius: 32px; 
            padding: 40px 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }

        .logo-resto { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #94a3b8; 
            margin-bottom: 25px; 
            font-weight: 800;
        }

        .welcome { font-size: 18px; margin-bottom: 5px; color: #cbd5e1; }
        .welcome strong { color: white; font-weight: 800; }

        .points-display { margin: 30px 0; }
        .points-number { 
            font-size: 80px; 
            font-weight: 800; 
            color: var(--primary); 
            line-height: 1; 
            margin-bottom: 5px;
            text-shadow: 0 0 30px var(--primary-glow);
        }
        
        .points-label { font-size: 12px; color: #64748b; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .progress-container { 
            background: rgba(255,255,255,0.05); 
            height: 14px; 
            border-radius: 20px; 
            margin: 25px 0 15px 0; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .progress-bar { 
            background: var(--primary); 
            height: 100%; 
            width: 0%; 
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 0 10px var(--primary-glow);
        }
        
        #phrase-info { font-size: 14px; color: #94a3b8; font-weight: 500; margin-bottom: 30px; }
        #phrase-info strong { color: white; }

        .qr-section {
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-top: 10px;
        }

        #qrcode { 
            background: white; 
            padding: 15px; 
            border-radius: 16px; 
            display: inline-block; 
            margin-bottom: 15px;
        }
        
        .instructions { font-size: 12px; color: #64748b; line-height: 1.5; font-weight: 500; }

        /* Animation de chargement */
        .loading-pulse { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-resto nom-resto">Chargement...</div>
        <p class="welcome">Bonjour <strong id="user-prenom">...</strong></p>
        
        <div class="points-display">
            <div class="points-number loading-pulse" id="user-points">-</div>
            <div class="points-label">Points Fidélité</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="barre-progression"></div>
        </div>

        <p id="phrase-info">Connexion sécurisée en cours...</p>

        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="instructions">Présentez ce QR Code lors de votre passage<br>pour cumuler vos points.</p>
        </div>
    </div>

    <script>
        // 1. Initialisation
        const config = appliquerConfig();
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        // 2. Fonction de mise à jour de l'interface
        function actualiserAffichage(points, prenom) {
            document.getElementById('user-prenom').innerText = prenom;
            
            const ptsElement = document.getElementById('user-points');
            ptsElement.innerText = points;
            ptsElement.classList.remove('loading-pulse');
            
            // Calcul de la jauge
            const pourcentage = (points / config.seuilPoints) * 100;
            document.getElementById('barre-progression').style.width = Math.min(pourcentage, 100) + "%";

            // Texte d'encouragement
            const phraseInfo = document.getElementById('phrase-info');
            const pointsRestants = config.seuilPoints - points;

            if (pointsRestants > 0) {
                phraseInfo.innerHTML = `Plus que <strong>${pointsRestants} points</strong> avant votre cadeau !`;
            } else {
                phraseInfo.innerHTML = `🎉 <strong>Cadeau débloqué !</strong>`;
                phraseInfo.style.color = "var(--primary)";
            }
        }

        // 3. Récupération des données en direct depuis Supabase
        async function chargerDonnees() {
            if (!email) {
                document.getElementById('phrase-info').innerHTML = "<span style='color:#ef4444;'>Lien invalide (Email manquant)</span>";
                document.getElementById('user-points').classList.remove('loading-pulse');
                return;
            }

            // Génération immédiate du QR code pour ne pas faire attendre le client
            new QRCode(document.getElementById("qrcode"), {
                text: email,
                width: 140,
                height: 140,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            try {
                // Requête Supabase : On cherche la ligne du client
                const { data, error } = await _supabase
                    .from('clients')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (data) {
                    // Le client existe dans Supabase, on affiche ses vrais points
                    const score = data[config.colonne_points] || 0;
                    const prenom = data.prenom || "Client";
                    actualiserAffichage(score, prenom);
                } else {
                    // Le client vient de s'inscrire, il n'a pas encore été scanné
                    // On affiche 0 par défaut
                    actualiserAffichage(0, "!");
                }
            } catch (err) {
                console.error("Erreur Supabase:", err);
                actualiserAffichage(0, "Client");
                document.getElementById('phrase-info').innerText = "Erreur de synchronisation.";
            }
        }

        // Lancement du chargement
        chargerDonnees();
    </script>
</body>
</html>
