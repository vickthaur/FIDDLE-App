<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félicitations !</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981; /* Vert par défaut, sera remplacé par config.js */
            --primary-glow: rgba(16, 185, 129, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #1e293b; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%);
        }
        
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 24px; 
            padding: 50px 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.04); 
            text-align: center; 
            position: relative; 
            border: 1px solid rgba(0,0,0,0.05);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* L'encoche de couleur en haut */
        .card::before { 
            content: ''; 
            position: absolute; 
            top: 0; left: 0; right: 0; 
            height: 6px; 
            background: var(--primary); 
            border-radius: 24px 24px 0 0;
        }
        
        .icon-check { 
            width: 80px;
            height: 80px;
            background: var(--primary-glow);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
        }

        .restaurant-name { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #94a3b8; 
            font-weight: 700; 
            margin-bottom: 15px; 
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 15px; color: #0f172a; }
        
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }
        .subtitle strong { color: var(--primary); }

        .btn-retour { 
            display: inline-block;
            width: 100%; 
            background: #f1f5f9; 
            color: #475569; 
            text-decoration: none;
            padding: 16px; 
            border-radius: 14px; 
            font-size: 15px; 
            font-weight: 700; 
            transition: all 0.3s ease; 
        }

        .btn-retour:hover { 
            background: #e2e8f0; 
            color: #1e293b;
            transform: translateY(-2px); 
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-check">✨</div>
        <div class="restaurant-name nom-resto">Chargement...</div>
        
        <h1>Bienvenue !</h1>
        
        <p class="subtitle">
            Votre inscription est validée.<br>
            Vous avez débloqué votre <strong>1er point</strong> de fidélité !
        </p>

        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 35px; line-height: 1.5;">
            Vérifiez vos emails : vous allez recevoir votre carte digitale d'ici quelques instants.
        </p>

        <a id="link-retour" href="#" class="btn-retour">Retour à l'accueil</a>

        <div class="footer-info">
            À très vite chez <span class="nom-resto"></span> !
        </div>
    </div>

    <script>
        // 1. On applique la configuration (Couleurs, Nom du resto)
        let config = {};
        if (typeof appliquerConfig === "function") {
            config = appliquerConfig();
        }

        // 2. On branche le bouton de retour sur l'accueil spécifique du resto
        // Exemple : index.html?resto=villa_saint_antoine
        const restoID = config.id || "bistrot";
        document.getElementById('link-retour').href = "index.html?resto=" + restoID;
    </script>

</body>
</html>
