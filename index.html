<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Fidélité</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1e293b; --primary-glow: rgba(30, 41, 59, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 20px;
        }
        .card { 
            background: #ffffff; width: 100%; max-width: 440px; border-radius: 32px; 
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); 
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
        }
        .restaurant-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #94a3b8; font-weight: 800; margin-bottom: 10px; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 30px; color: #0f172a; letter-spacing: -1px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; margin-left: 4px; }
        .form-group input { width: 100%; padding: 15px 18px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 14px; font-family: inherit; background-color: #f8fafc; transition: 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px var(--primary-glow); }
        
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--primary-glow); }
        
        .footer { font-size: 10px; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="restaurant-tag nom-resto">Chargement...</div>
        <h1>Créer ma carte</h1>

        <form id="form-inscription" method="POST">
            <div class="form-group">
                <label>Entrez votre PRENOM *</label>
                <input type="text" id="prenom" name="PRENOM" placeholder="Prénom" required>
            </div>

            <div class="form-group">
                <label>Entrez votre NOM</label>
                <input type="text" id="nom" name="NOM" placeholder="Nom">
            </div>

            <div class="form-group">
                <label>Veuillez renseigner votre adresse email *</label>
                <input type="email" id="email" name="EMAIL" placeholder="exemple@mail.com" required>
            </div>

            <div class="form-group">
                <label>Entrez votre SMS *</label>
                <input type="tel" id="sms" name="SMS" placeholder="0612345678" required>
            </div>

            <div class="form-group">
                <label>Entrez votre DATE_ANNIVERSAIRE</label>
                <input type="date" id="anniversaire" name="DATE_ANNIVERSAIRE">
            </div>

            <input type="hidden" name="email_address_check" value="">
            <input type="hidden" name="locale" value="fr">

            <button type="submit" id="btn-submit">S'INSCRIRE 🚀</button>
        </form>

        <div class="footer">Fiddle Bro's — Fidélité Digitale</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig();
            const form = document.getElementById('form-inscription');
            const btn = document.getElementById('btn-submit');

            if (config.id !== "default") form.action = config.formInscription;

            form.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                btn.innerText = "Synchronisation CRM...";
                btn.disabled = true;

                const emailVal = document.getElementById('email').value.trim().toLowerCase();
                const prenomVal = document.getElementById('prenom').value.trim();
                const nomVal = document.getElementById('nom').value.trim();
                const smsVal = document.getElementById('sms').value.trim();
                const annivVal = document.getElementById('anniversaire').value;

                try {
                    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    // 1. Enregistrement CRM Complet dans Supabase
                    await _supabase.from('clients').upsert({ 
                        email: emailVal, 
                        prenom: prenomVal,
                        nom: nomVal,
                        telephone: smsVal,
                        date_anniversaire: annivVal,
                        restaurant_origine: config.id
                    });

                    // 2. Initialisation des points si nécessaire
                    const { data: hasPoints } = await _supabase.from('points')
                        .select('id').eq('client_email', emailVal).eq('restaurant_id', config.id).maybeSingle();

                    if (!hasPoints) {
                        await _supabase.from('points').insert([{
                            client_email: emailVal,
                            restaurant_id: config.id,
                            total_points: config.pointsBienvenue || 0
                        }]);
                    }
                } catch (err) { console.error("Erreur CRM:", err); }

                // 3. Départ vers Brevo
                form.submit();
            });
        });
    </script>
</body>
</html>
