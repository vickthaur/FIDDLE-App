<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Fidélité - Inscription</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e63946; 
            --primary-hover: #d62828;
            --primary-glow: rgba(230, 57, 70, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #1e293b; 
            padding: 20px; 
        }
        
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 24px; 
            padding: 40px 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02); 
            text-align: center; 
            position: relative; 
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box { font-size: 45px; margin-bottom: 10px; }
        
        .restaurant-name { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #94a3b8; 
            font-weight: 700; 
            margin-bottom: 20px; 
        }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; color: #0f172a; letter-spacing: -0.5px; }
        
        .subtitle { font-size: 14px; color: #64748b; margin-bottom: 30px; line-height: 1.5; }

        /* Champs du formulaire */
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #334155; }
        
        .form-group input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid #e2e8f0; 
            border-radius: 14px; 
            font-family: inherit; 
            font-size: 15px; 
            transition: all 0.2s ease; 
            background-color: #fcfdfe; 
        }

        .form-group input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #fff; 
            box-shadow: 0 0 0 4px var(--primary-glow); 
        }

        /* Bouton */
        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Status & Footer */
        #status-msg { font-size: 12px; margin-bottom: 20px; font-weight: 600; display: none; padding: 10px; border-radius: 10px; }
        .footer-note { font-size: 11px; color: #94a3b8; margin-top: 25px; line-height: 1.6; }
        
        /* Version Villa Saint Antoine (Or) */
        .villa-mode { background-image: radial-gradient(circle at top right, rgba(197, 160, 89, 0.15) 0%, transparent 40%); }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div class="logo-box">🎁</div>
        <div class="restaurant-name nom-resto">Chargement...</div>
        
        <h1>Rejoignez le Club !</h1>
        <p class="subtitle texte-recompense">Chargement de votre offre exclusive...</p>

        <div id="status-msg"></div>

        <form id="form-inscription" method="POST">
            <div class="form-group">
                <label for="prenom">Votre Prénom</label>
                <input type="text" id="prenom" name="PRENOM" placeholder="Ex: Jean" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" name="EMAIL" placeholder="jean@email.com" required>
            </div>

            <div class="form-group">
                <label for="anniversaire">Date de naissance <span style="font-weight:400; font-size:11px; color:#94a3b8;">(Optionnel)</span></label>
                <input type="text" id="anniversaire" name="ANNIVERSAIRE" placeholder="JJ-MM-AAAA">
            </div>

            <input type="hidden" name="email_address_check" value="">
            <input type="hidden" name="locale" value="fr">
            <input type="hidden" name="html_type" value="simple">

            <button type="submit" id="btn-submit" disabled>C'est parti ! 🚀</button>
        </form>

        <div class="footer-note">
            Pas de spam, seulement vos avantages.<br>
            © <span class="nom-resto"></span> - Programme de Fidélité
        </div>
    </div>

    <script>
        window.onload = function() {
            const btnSubmit = document.getElementById('btn-submit');
            const form = document.getElementById('form-inscription');
            const statusMsg = document.getElementById('status-msg');

            try {
                // 1. On lance la configuration dynamique
                const config = appliquerConfig();

                if (config && config.formInscription) {
                    // 2. On branche le formulaire sur le bon lien Brevo
                    form.action = config.formInscription;
                    
                    // 3. On débloque le bouton
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = `Gagner mon 1er point 🎉`;

                    // 4. Adaptations spécifiques de design
                    if (config.id === "villa_saint_antoine") {
                        document.body.classList.add('villa-mode');
                        document.querySelector('.logo-box').innerHTML = "✨";
                    }
                } else {
                    statusMsg.style.display = "block";
                    statusMsg.style.color = "#e63946";
                    statusMsg.innerHTML = "⚠️ Configuration incomplète (Lien Brevo)";
                }
            } catch (error) {
                console.error(error);
                statusMsg.style.display = "block";
                statusMsg.style.color = "#e63946";
                statusMsg.innerHTML = "❌ Erreur : Fichier config.js manquant";
            }
        };
    </script>
</body>
</html>
