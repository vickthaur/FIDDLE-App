<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Fidélité - Inscription</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e63946; /* Valeur par défaut, surchargée par config.js */
            --primary-glow: rgba(230, 57, 70, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #1e293b; 
            padding: 20px;
            /* Effet de lumière diffuse en haut à droite */
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%);
        }
        
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 28px; 
            padding: 45px 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.04); 
            text-align: center; 
            position: relative; 
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-icon { font-size: 50px; margin-bottom: 10px; display: block; }
        
        .restaurant-tag { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #94a3b8; 
            font-weight: 800; 
            margin-bottom: 20px; 
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #0f172a; letter-spacing: -1px; }
        
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }
        .subtitle strong { color: var(--primary); font-weight: 700; }

        /* Formulaire */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #334155; margin-left: 5px; }
        
        .form-group input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid #f1f5f9; 
            border-radius: 16px; 
            font-family: inherit; 
            font-size: 15px; 
            font-weight: 500;
            transition: all 0.2s ease; 
            background-color: #f8fafc; 
        }

        .form-group input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #fff; 
            box-shadow: 0 0 0 5px var(--primary-glow); 
        }

        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 15px; 
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 15px 30px var(--primary-glow); }
        button:active { transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        #error-box { 
            display: none; 
            background: #fff1f2; 
            color: #e11d48; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 20px; 
        }

        .footer { font-size: 11px; color: #94a3b8; margin-top: 35px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <div id="resto-icon" class="logo-icon">🎁</div>
        <div class="restaurant-tag nom-resto">Chargement...</div>
        
        <h1>Bienvenue au Club</h1>
        <p class="subtitle">Inscrivez-vous pour débloquer votre offre :<br><strong class="texte-recompense">Chargement de l'offre...</strong></p>

        <div id="error-box"></div>

        <form id="form-inscription" method="POST">
            <div class="form-group">
                <label for="prenom">Comment vous appelez-vous ?</label>
                <input type="text" id="prenom" name="PRENOM" placeholder="Votre prénom" required>
            </div>

            <div class="form-group">
                <label for="email">Votre meilleur Email</label>
                <input type="email" id="email" name="EMAIL" placeholder="exemple@mail.com" required>
            </div>

            <input type="hidden" name="email_address_check" value="">
            <input type="hidden" name="locale" value="fr">

            <button type="submit" id="btn-submit" disabled>Rejoindre le Club ✨</button>
        </form>

        <div class="footer">
            En rejoignant notre club, vous acceptez de recevoir vos avantages par mail.<br>
            © <span class="nom-resto"></span>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('form-inscription');
            const btn = document.getElementById('btn-submit');
            const errorBox = document.getElementById('error-box');

            try {
                // 1. Appel du cerveau config.js
                const config = appliquerConfig();

                if (config && config.formInscription) {
                    // 2. On branche le formulaire sur le bon Brevo
                    form.action = config.formInscription;
                    
                    // 3. On personnalise l'icône selon le resto
                    const iconEl = document.getElementById('resto-icon');
                    if (config.id === "villa_saint_antoine") {
                        iconEl.innerHTML = "✨";
                    } else {
                        iconEl.innerHTML = "🍴";
                    }

                    // 4. On active le bouton
                    btn.disabled = false;
                    btn.innerHTML = "Gagner mon 1er point 🚀";

                } else {
                    throw new Error("Lien Brevo manquant dans config.js");
                }
            } catch (err) {
                errorBox.style.display = "block";
                errorBox.innerText = "⚠️ Erreur de configuration : " + err.message;
                console.error(err);
            }
        });
    </script>
</body>
</html>
