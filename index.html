<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fiddle Bro's | Inscription Premium</title>

    

    <script src="config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    

    <style>

        :root {

            --primary: #1e293b; 

            --primary-glow: rgba(30, 41, 59, 0.15);

            --success-color: #10b981;

            --bg-color: #f8fafc;

            --input-bg: #f1f5f9;

        }


        * { box-sizing: border-box; margin: 0; padding: 0; }


        body { 

            font-family: 'Plus Jakarta Sans', sans-serif; 

            background-color: var(--bg-color);

            display: flex; justify-content: center; align-items: center; 

            min-height: 100vh; color: #1e293b; padding: 20px;

            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 50%);

        }

        

        .card { 

            background: #ffffff; width: 100%; max-width: 460px; 

            border-radius: 32px; padding: 45px 40px; 

            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); 

            text-align: center; border: 1px solid rgba(0,0,0,0.04);

            position: relative; overflow: hidden;

        }


        .logo-placeholder { font-size: 52px; margin-bottom: 18px; display: block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05)); }

        .restaurant-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #94a3b8; font-weight: 800; margin-bottom: 8px; }

        h1 { font-size: 30px; font-weight: 800; margin-bottom: 8px; color: #0f172a; letter-spacing: -1px; }

        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }

        .subtitle strong { color: var(--primary); font-weight: 800; }


        /* GRILLE PREMIUM (2 Colonnes) */

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

        .full-width { grid-column: span 2; }


        .form-group { text-align: left; }

        .form-group label { 

            display: block; font-size: 10px; font-weight: 800; color: #94a3b8; 

            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-left: 4px; 

        }

        

        .form-group input { 

            width: 100%; padding: 16px 20px; border: 2px solid transparent; 

            border-radius: 16px; font-size: 15px; font-weight: 500;

            background-color: var(--input-bg); color: #0f172a;

            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            font-family: inherit;

        }

        .form-group input::placeholder { color: #94a3b8; font-weight: 400; }

        .form-group input:focus { 

            outline: none; background-color: #fff; border-color: var(--primary); 

            box-shadow: 0 0 0 5px var(--primary-glow); transform: translateY(-2px);

        }


        button { 

            width: 100%; background: var(--primary); color: white; border: none; 

            padding: 20px; border-radius: 18px; font-size: 16px; font-weight: 800; 

            cursor: pointer; transition: all 0.3s ease; 

            box-shadow: 0 10px 20px -5px var(--primary-glow);

        }

        button:hover { transform: translateY(-4px); box-shadow: 0 15px 25px -5px var(--primary-glow); filter: brightness(1.05); }

        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }


        /* ANIMATIONS SUCCÈS */

        #success-state { display: none; padding: 20px 0; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes slideUp { 

            from { opacity: 0; transform: translateY(20px) scale(0.95); } 

            to { opacity: 1; transform: translateY(0) scale(1); } 

        }


        .success-icon { font-size: 72px; margin-bottom: 20px; animation: bounceIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes bounceIn {

            0% { transform: scale(0); }

            50% { transform: scale(1.1); }

            100% { transform: scale(1); }

        }


        .footer { font-size: 11px; font-weight: 600; color: #cbd5e1; margin-top: 30px; letter-spacing: 0.5px; }


        /* IFRAME CACHÉE PROPREMENT */

        #hidden_iframe { display: none; width: 0; height: 0; border: none; }

    </style>

</head>

<body>


    <div class="card">

        <div id="form-state">

            <div id="visual-icon" class="logo-placeholder">🎁</div>

            <div class="restaurant-tag nom-resto">Chargement...</div>

            <h1>Bienvenue</h1>

            <p class="subtitle">

                Inscrivez-vous pour profiter de :<br>

                <strong class="texte-recompense">Chargement...</strong>

            </p>


            <form id="form-inscription" method="POST" target="hidden_iframe">

                

                <div class="form-grid">

                    <div class="form-group">

                        <label>PRÉNOM *</label>

                        <input type="text" id="prenom" name="PRENOM" placeholder="Ex: Jean" required>

                    </div>


                    <div class="form-group">

                        <label>NOM</label>

                        <input type="text" id="nom" name="NOM" placeholder="Ex: Dupont">

                    </div>


                    <div class="form-group full-width">

                        <label>ADRESSE EMAIL *</label>

                        <input type="email" id="email" name="EMAIL" placeholder="jean.dupont@mail.com" required>

                    </div>


                    <div class="form-group">

                        <label>SMS *</label>

                        <input type="text" id="sms" name="SMS" placeholder="06 12 34 56 78" required>

                    </div>


                    <div class="form-group">

                        <label>ANNIVERSAIRE</label>

                        <input type="text" id="anniversaire" name="DATE_ANNIVERSAIRE" placeholder="JJ/MM/AAAA">

                    </div>

                </div>


                <input type="hidden" name="email_address_check" value="">

                <input type="hidden" name="locale" value="fr">

                <input type="hidden" name="html_type" value="simple">


                <button type="submit" id="btn-submit">S'INSCRIRE 🚀</button>

            </form>

        </div>


        <div id="success-state">

            <div class="success-icon">💌</div>

            <h2 style="font-size: 26px; font-weight: 800; margin-bottom: 12px; color: var(--success-color);">C'est envoyé !</h2>

            <p class="subtitle" style="margin-bottom: 25px;">

                Vos informations sont enregistrées.<br>

                <strong>Vérifiez vos emails</strong> pour accéder à votre carte de fidélité.

            </p>

            <button onclick="window.location.reload()" style="background: #f8fafc; color: #64748b; box-shadow: none; border: 2px solid #f1f5f9;">Retourner à l'accueil</button>

        </div>


        <div class="footer">

            POWERED BY <strong>FIDDLE BRO'S</strong>

        </div>

    </div>


    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>


    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const config = appliquerConfig();

            const form = document.getElementById('form-inscription');

            const btn = document.getElementById('btn-submit');

            const visualIcon = document.getElementById('visual-icon');


            if (config.id !== "default") {

                form.action = config.formInscription;

                if (config.id === "villa_saint_antoine") visualIcon.innerHTML = "✨";

                if (config.id === "bistrot") visualIcon.innerHTML = "🍴";

            }


            form.addEventListener('submit', async function(e) {

                // 1. OBLIGATOIRE : On met l'envoi du formulaire sur "Pause" pour éviter les bugs

                e.preventDefault(); 

                

                btn.innerHTML = '<span style="opacity: 0.8;">Synchronisation...</span>';

                btn.disabled = true;


                const emailVal = document.getElementById('email').value.trim().toLowerCase();

                const prenomVal = document.getElementById('prenom').value.trim();

                const nomVal = document.getElementById('nom').value.trim();

                const smsVal = document.getElementById('sms').value.trim();

                const annivVal = document.getElementById('anniversaire').value.trim();


                try {

                    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                    

                    // CRM Supabase

                    await _supabase.from('clients').upsert({ 

                        email: emailVal, 

                        prenom: prenomVal,

                        nom: nomVal,

                        telephone: smsVal,

                        date_anniversaire: annivVal,

                        restaurant_origine: config.id

                    });


                    // Points

                    const { data: hasPoints } = await _supabase.from('points')

                        .select('id').eq('client_email', emailVal).eq('restaurant_id', config.id).maybeSingle();


                    if (!hasPoints) {

                        await _supabase.from('points').insert([{

                            client_email: emailVal,

                            restaurant_id: config.id,

                            total_points: config.pointsBienvenue || 0

                        }]);

                    }


                } catch (err) {

                    console.error("Erreur CRM Supabase:", err);

                }


                // 2. ON DÉBLOQUE L'ENVOI ! Le formulaire part maintenant dans l'Iframe

                form.submit();


                // 3. Basculement visuel vers l'écran de succès

                setTimeout(() => {

                    document.getElementById('form-state').style.display = 'none';

                    document.getElementById('success-state').style.display = 'block';

                }, 400); // On laisse 400ms pour que l'iframe charge la page Brevo

            });

        });

    </script>

</body>

</html>
